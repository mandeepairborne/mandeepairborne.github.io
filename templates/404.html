{% extends "base.html" %}

{% block content %}
<article class="center" style="text-align: center; margin-top: 4rem;">
    <h1 style="font-family: 'Leitura News', serif; font-weight: 800; font-size: 4em; color: var(--accent-color);">
        404
    </h1>
    
    <div class="callout" style="max-width: 600px; margin: 2rem auto;">
        <p style="font-size: 1.2em; line-height: 1.5;">
            The page you're looking for has vanished like a 
            <span style="font-family: 'Inconsolata', monospace;">git reset --hard</span>.
        </p>
        
        <div style="margin-top: 2rem;">
            <a href="{{ config.base_url }}" 
               class="button" 
               style="display: inline-block; 
                      padding: 0.8rem 1.5rem;
                      border: 1px solid var(--crisp-border);
                      border-radius: 3px;
                      box-shadow: 2px 2px 0 rgba(0,0,0,0.25);
                      text-decoration: none;">
               🏠 Return Home
            </a>
        </div>
    </div>

    
</article>
{% endblock content %}
