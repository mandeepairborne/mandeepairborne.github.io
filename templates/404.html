{# templates/404.html #}
{% extends "base.html" %}

{% block content %}
<article class="center" style="text-align: center; margin-top: var(--spacing-large);">
    <h1 style="font-family: 'Leitura News'; font-weight: 800; color: var(--accent-color);">
       Error 404
    </h1>

    {# GIF Container using existing spacing #}
    <div style="margin: var(--spacing-large) auto; max-width: var(--main-width);">
        <img src="https://media3.giphy.com/media/UoeaPqYrimha6rdTFV/giphy.gif" 
             alt="404 error" 
             style="width: 100%; 
                    height: auto; 
                    max-width: 600px; 
                    border: 1px solid var(--crisp-border);
                    border-radius: 3px;
                    box-shadow: 4px 4px 0 rgba(0,0,0,0.25);">
    </div>

    {# Existing callout class #}
    <div class="callout" style="max-width: var(--main-width); margin: 0 auto;">
        <p style="font-size: 1.1em; color: var(--text-color); margin-bottom: var(--spacing-small);">
            Not all who wander are lost but you certainly are.
        </p>
        
    <a href="{{ config.base_url }}" 
           class="input-group-button" 
           style="padding: var(--spacing-small) var(--spacing-large);
                  border: 1px solid var(--crisp-border);
                  box-shadow: 2px 2px 0 rgba(0,0,0,0.25);
                  text-decoration: none;">
           Return to Homepage
        </a>
    </div>
</article>
{% endblock content %}
